<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Icon block -->
  <rect x="0" y="0" width="44" height="44" rx="5" fill="#122040"/>
  <rect x="0" y="38" width="44" height="6" rx="0" fill="#c9a84c"/>
  <!-- G in gold -->
  <text x="4" y="33" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#c9a84c">G</text>
  <!-- R in white -->
  <text x="23" y="33" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#f5f0e8">R</text>
  <!-- Wordmark -->
  <text x="54" y="20" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#c9a84c" letter-spacing="0.5">The Giant</text>
  <text x="54" y="38" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#f5f0e8" letter-spacing="0.5">Reach</text>
  <!-- Gold underline accent -->
  <rect x="54" y="42" width="88" height="2" fill="#c9a84c" opacity="0.5"/>
