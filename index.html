<style>
:root {
  --navy: #0a1628;
  --navy-mid: #122040;
  --navy-light: #1a2d55;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.13);
  --white: #f5f0e8;
  --gray: #8a9ab5;
  --gray-light: #b0bdd4;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;line-height:1.6;}

/* ── LOGO SVG ── */
.logo-wrap{display:flex;align-items:center;gap:0.6rem;text-decoration:none;}
.logo-icon{width:34px;height:34px;flex-shrink:0;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold);letter-spacing:0.03em;line-height:1;}
.logo-text span{color:var(--white);}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.1rem 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(10,22,40,0.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,168,76,0.13);}
.nav-links{display:flex;gap:1.8rem;align-items:center;}
.nav-links a{color:var(--white);text-decoration:none;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;opacity:0.65;transition:opacity 0.2s,color 0.2s;}
.nav-links a:hover{opacity:1;color:var(--gold);}
.nav-cta{background:var(--gold)!important;color:var(--navy)!important;padding:0.55rem 1.3rem!important;border-radius:2px;font-weight:600;opacity:1!important;font-size:0.78rem!important;transition:background 0.2s!important;}
.nav-cta:hover{background:var(--gold-light)!important;}
/* ── HAMBURGER ── */
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:201;}
.hamburger span{display:block;width:24px;height:2px;background:var(--gold);transition:transform 0.3s,opacity 0.3s;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
/* ── MOBILE MENU DRAWER ── */
.mobile-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,22,40,0.99);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:2rem;}
.mobile-menu.open{display:flex;}
.mobile-menu a{color:var(--white);text-decoration:none;font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;padding:1rem 2rem;letter-spacing:0.03em;opacity:0.75;transition:opacity 0.2s,color 0.2s;text-align:center;border-bottom:1px solid rgba(201,168,76,0.08);width:100%;max-width:340px;}
.mobile-menu a:first-child{border-top:1px solid rgba(201,168,76,0.08);}
.mobile-menu a:hover{opacity:1;color:var(--gold);}
.mobile-menu .mobile-cta{background:var(--gold);color:var(--navy)!important;font-family:'DM Sans',sans-serif;font-size:0.9rem!important;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:1rem 2rem;border-radius:2px;margin-top:1.5rem;border:none;opacity:1!important;}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;align-items:center;padding:9rem 5% 5rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-15%;right:-8%;width:55vw;height:55vw;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.25;}
.hero-inner{max-width:780px;animation:fadeUp 0.9s ease both;}
.eyebrow{font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.4rem;display:flex;align-items:center;gap:0.8rem;}
.eyebrow::before{content:'';width:28px;height:1px;background:var(--gold);flex-shrink:0;}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,5vw,4.2rem);font-weight:900;line-height:1.1;margin-bottom:1.4rem;color:var(--white);}
h1 em{font-style:normal;color:var(--gold);}
.hero-sub{font-size:1rem;line-height:1.8;color:var(--gray-light);max-width:580px;margin-bottom:2.2rem;}
.hero-sub strong{color:var(--white);font-weight:500;}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-primary{background:var(--gold);color:var(--navy);padding:0.95rem 2rem;font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:background 0.2s,transform 0.2s;display:inline-block;}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);}
.btn-outline{border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:0.95rem 2rem;font-size:0.86rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;transition:border-color 0.2s,background 0.2s;display:inline-block;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-outline:hover{border-color:var(--gold);background:var(--gold-dim);}

/* ── TRUST BUILDER ── */
.trust-section{background:var(--navy-mid);border-top:1px solid rgba(201,168,76,0.1);border-bottom:1px solid rgba(201,168,76,0.1);padding:4rem 5%;}
.trust-headline{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray);margin-bottom:2rem;}
.trust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(201,168,76,0.08);}
.trust-card{background:var(--navy-mid);padding:2rem 1.8rem;}
.trust-problem{font-size:0.88rem;color:var(--gray-light);line-height:1.6;margin-bottom:0.5rem;}
.trust-problem::before{content:'— ';color:var(--gold);}

/* ── SHARED SECTION STYLES ── */
section{padding:6rem 5%;}
.section-label{font-size:0.68rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.7rem;}
.section-label::before{content:'';width:20px;height:1px;background:var(--gold);flex-shrink:0;}
h2{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.2vw,2.7rem);font-weight:700;margin-bottom:1rem;line-height:1.18;}
h2 em{font-style:normal;color:var(--gold);}
h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--white);margin-bottom:0.45rem;}
.section-intro{font-size:0.95rem;color:var(--gray);max-width:560px;line-height:1.8;margin-bottom:2.8rem;}

/* ── PROBLEM SECTION ── */
.problem-section{background:var(--navy);}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
@media(max-width:760px){.problem-grid{grid-template-columns:1fr;gap:2.5rem;}}
.problem-list{list-style:none;display:flex;flex-direction:column;gap:0.9rem;margin:1.5rem 0;}
.problem-list li{display:flex;align-items:flex-start;gap:0.9rem;font-size:0.9rem;color:var(--gray);line-height:1.55;}
.problem-list li::before{content:'✗';color:#e05a5a;flex-shrink:0;font-size:0.85rem;margin-top:0.1rem;}
.solution-flow{display:flex;flex-direction:column;gap:0;}
.flow-step{display:flex;align-items:center;gap:1rem;padding:1.2rem 1.5rem;border:1px solid rgba(201,168,76,0.12);border-bottom:none;background:var(--navy-mid);transition:background 0.2s;}
.flow-step:last-child{border-bottom:1px solid rgba(201,168,76,0.12);}
.flow-step:hover{background:var(--navy-light);}
.flow-arrow{color:var(--gold);font-size:1.2rem;flex-shrink:0;}
.flow-label{font-size:0.82rem;color:var(--white);font-weight:500;letter-spacing:0.05em;}
.flow-sub{font-size:0.75rem;color:var(--gray);margin-top:0.15rem;}

/* ── HOW IT WORKS ── */
.how-section{background:var(--navy-mid);}
.steps-wrap{border:1px solid rgba(201,168,76,0.1);margin-top:1rem;}
.step-row{display:grid;grid-template-columns:100px 1fr;border-bottom:1px solid rgba(201,168,76,0.08);transition:background 0.22s;}
.step-row:last-child{border-bottom:none;}
.step-row:nth-child(even){background:rgba(10,22,40,0.4);}
.step-row:hover{background:rgba(201,168,76,0.04);}
.step-num-col{padding:2.2rem 1.5rem;border-right:1px solid rgba(201,168,76,0.08);display:flex;align-items:flex-start;justify-content:center;padding-top:2.5rem;}
.step-num-col span{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;color:var(--gold-dim);line-height:1;}
.step-content-col{padding:2.2rem 2.2rem;}
.step-tag{display:inline-block;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2);padding:0.18rem 0.6rem;margin-bottom:0.6rem;}
.step-title{font-size:1rem;font-weight:500;color:var(--white);margin-bottom:0.4rem;}
.step-desc{font-size:0.85rem;color:var(--gray);line-height:1.75;}
.system-closing{margin-top:2.2rem;padding:1.8rem 2.2rem;border:1px solid rgba(201,168,76,0.18);background:var(--navy);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;}
.system-closing p{font-family:'Playfair Display',serif;font-size:0.98rem;font-style:italic;color:var(--white);max-width:460px;line-height:1.55;}

/* ── WHAT YOU GET ── */
.deliverables-section{background:var(--navy);}
.deliverables-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:rgba(201,168,76,0.08);margin-top:2.5rem;}
.deliverable-card{background:var(--navy);padding:2rem 1.8rem;position:relative;overflow:hidden;transition:background 0.25s;}
.deliverable-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width 0.4s;}
.deliverable-card:hover::after{width:100%;}
.deliverable-card:hover{background:var(--navy-mid);}
.deliverable-icon{font-size:1.6rem;margin-bottom:0.8rem;}
.deliverable-title{font-size:0.95rem;font-weight:500;color:var(--white);margin-bottom:0.4rem;}
.deliverable-desc{font-size:0.8rem;color:var(--gray);line-height:1.65;}

/* ── WHO IT'S FOR ── */
.for-section{background:var(--navy-mid);}
.for-split{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
@media(max-width:760px){.for-split{grid-template-columns:1fr;gap:2.5rem;}}
.for-criteria{list-style:none;display:flex;flex-direction:column;gap:0.8rem;margin-bottom:2rem;}
.for-criteria li{display:flex;align-items:flex-start;gap:0.8rem;font-size:0.88rem;color:var(--gray);line-height:1.55;}
.for-criteria li::before{content:'✓';color:var(--gold);flex-shrink:0;font-weight:600;}
.for-examples{display:flex;flex-direction:column;gap:0.6rem;}
.for-example{display:flex;align-items:center;gap:0.9rem;padding:0.9rem 1.2rem;border:1px solid rgba(201,168,76,0.1);background:var(--navy);font-size:0.86rem;color:var(--white);transition:border-color 0.2s;}
.for-example:hover{border-color:rgba(201,168,76,0.3);}
.for-example-icon{font-size:1.1rem;flex-shrink:0;}

/* ── AUTHORITY ── */
.authority-section{background:var(--navy);border-top:1px solid rgba(201,168,76,0.1);}
.authority-inner{display:grid;grid-template-columns:320px 1fr;gap:5rem;align-items:center;}
@media(max-width:800px){.authority-inner{grid-template-columns:1fr;gap:3rem;}}
.founder-photo{aspect-ratio:3/4;border:1px solid rgba(201,168,76,0.18);overflow:hidden;position:relative;}
.founder-photo img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform 0.5s;}
.founder-photo:hover img{transform:scale(1.03);}
.founder-photo::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(201,168,76,0.05) 0%,transparent 70%);z-index:1;pointer-events:none;}
.founder-name{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,2.8vw,2.3rem);font-weight:700;margin-bottom:0.25rem;}
.founder-role{color:var(--gold);font-size:0.78rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:1.6rem;}
.founder-text{font-size:0.9rem;color:var(--gray);line-height:1.85;margin-bottom:0.9rem;}
.cred-list{list-style:none;display:flex;flex-direction:column;gap:0.6rem;margin:1.5rem 0;}
.cred-list li{display:flex;align-items:flex-start;gap:0.8rem;font-size:0.85rem;color:var(--gray);line-height:1.5;}
.cred-list li::before{content:'→';color:var(--gold);flex-shrink:0;}
.founder-links{display:flex;gap:0.8rem;margin-top:1.8rem;flex-wrap:wrap;}
.founder-link{border:1px solid rgba(201,168,76,0.28);color:var(--gold);padding:0.45rem 1rem;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;transition:background 0.2s,border-color 0.2s;}
.founder-link:hover{background:var(--gold-dim);border-color:var(--gold);}

/* ── CERTIFICATES ── */
.certs-section{background:var(--navy-mid);}
.certs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem;}
@media(max-width:700px){.certs-grid{grid-template-columns:1fr;}}
.cert-wrap{border:1px solid rgba(201,168,76,0.15);overflow:hidden;position:relative;cursor:zoom-in;}
.cert-wrap img{width:100%;display:block;transition:transform 0.4s;}
.cert-wrap:hover img{transform:scale(1.03);}
.cert-label{padding:0.8rem 1rem;background:var(--navy);font-size:0.72rem;color:var(--gray);letter-spacing:0.08em;text-transform:uppercase;}

/* ── AUDIT SECTION ── */
.audit-section{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border-top:1px solid rgba(201,168,76,0.1);border-bottom:1px solid rgba(201,168,76,0.1);}
.audit-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
@media(max-width:700px){.audit-inner{grid-template-columns:1fr;gap:3rem;}}
.audit-list{list-style:none;display:flex;flex-direction:column;gap:0.85rem;}
.audit-list li{display:flex;align-items:flex-start;gap:0.85rem;font-size:0.87rem;color:var(--gray);line-height:1.55;}
.audit-list li::before{content:'→';color:var(--gold);flex-shrink:0;margin-top:0.05rem;}

/* ── CTA SECTION ── */
.cta-section{text-align:center;padding:7rem 5%;position:relative;overflow:hidden;}
.cta-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none;}
.cta-section h2{margin-bottom:1rem;}
.cta-section p{color:var(--gray);font-size:0.96rem;margin-bottom:2.5rem;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.8;}

/* ── INTERNAL LINKS BAR ── */
.int-links{background:var(--navy-mid);border-top:1px solid rgba(201,168,76,0.08);padding:1.4rem 5%;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;}
.int-links a{color:var(--gray);text-decoration:none;font-size:0.76rem;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;display:flex;align-items:center;gap:0.45rem;}
.int-links a::before{content:'→';color:var(--gold);font-size:0.7rem;}
.int-links a:hover{color:var(--gold);}

/* ── FOOTER ── */
footer{padding:2.2rem 5%;border-top:1px solid rgba(201,168,76,0.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
footer p{font-size:0.76rem;color:var(--gray);}
footer a{color:var(--gold);text-decoration:none;font-size:0.76rem;}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(5,12,24,0.97);z-index:500;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border:1px solid rgba(201,168,76,0.18);}
.lightbox-close{position:absolute;top:1.5rem;right:2rem;color:var(--gold);font-size:2rem;cursor:pointer;background:none;border:none;}

/* ── FLOAT BUTTONS ── */
.float-stack{position:fixed;bottom:1.8rem;right:1.8rem;display:flex;flex-direction:column;align-items:flex-end;gap:0.65rem;z-index:200;}
.float-wrap{position:relative;display:flex;align-items:center;}
.float-tip{position:absolute;right:62px;background:var(--navy-mid);border:1px solid rgba(201,168,76,0.2);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.66rem;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;padding:0.28rem 0.7rem;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.float-wrap:hover .float-tip{opacity:1;}
.float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform 0.2s;border:none;cursor:pointer;}
.float-btn:hover{transform:scale(1.1);}
.float-btn svg{width:24px;height:24px;}
.float-btn.cal{background:#006BFF;box-shadow:0 4px 16px rgba(0,107,255,0.38);}
.float-btn.wa{background:#25D366;box-shadow:0 4px 16px rgba(37,211,102,0.36);}

/* ── PRIVACY MODAL ── */
#privacy-modal{display:none;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.fade-up{opacity:0;transform:translateY(22px);transition:opacity 0.7s ease,transform 0.7s ease;}
.fade-up.visible{opacity:1;transform:translateY(0);}

@media(max-width:600px){
  .nav-links{display:none;}
  .hamburger{display:flex;}
  .trust-grid{grid-template-columns:1fr;}
  .step-row{grid-template-columns:65px 1fr;}
  .step-num-col span{font-size:2rem;}
  .float-tip{display:none;}
  .int-links{gap:1.4rem;}
  .certs-grid{grid-template-columns:1fr;}
}
</style>
